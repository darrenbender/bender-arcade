<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dragons vs Zombies">
<title>Dragons vs. Zombies</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="hud hidden" id="hud">
  <div class="hud-score">🌟 <span id="scoreCount">0</span></div>
  <div class="hud-stage" id="hudStage">🐉 Hatchling</div>
  <div class="hud-meter">
    <div class="hud-meter-label">💤 Sleepy</div>
    <div class="hud-meter-bar"><div class="hud-meter-fill" id="meterFill"></div></div>
  </div>
</div>

<button class="mute-btn" id="muteBtn" aria-label="Mute">🔇</button>

<div class="wave-banner" id="waveBanner">Wave 2…</div>
<div class="wave-banner district-banner" id="districtBanner">🏘️ Village Square!</div>
<div class="grew-banner" id="grewBanner"><span>✨</span><span>You grew up!</span><span>✨</span></div>

<div class="overlay" id="dragonPickerScreen">
  <div class="player-banner">Playing as <span id="dpPlayerName">—</span></div>
  <h1>Pick a Dragon</h1>
  <p class="sub">Wake up the sleepy zombies with your fire puff!</p>
  <div class="dragon-grid" id="dragonGrid"></div>
  <button class="secondary-btn" id="dpSwitchPlayer">Switch Player</button>
</div>

<div class="overlay hidden" id="controlPickerScreen">
  <div class="player-banner">Playing as <span id="cpPlayerName">—</span> · <span id="cpDragonName">—</span></div>
  <h1>How will you play?</h1>
  <p class="sub">You can change this any time.</p>
  <div class="mode-buttons">
    <button class="mode-btn" id="modeAuto" data-mode="auto">
      <span class="emoji">🎯</span>
      Auto-aim
      <span class="tag">Easy. Just steer your dragon.</span>
    </button>
    <button class="mode-btn" id="modeAim" data-mode="aim">
      <span class="emoji">🔥</span>
      I'll aim
      <span class="tag">Tap or click to shoot fire.</span>
    </button>
  </div>
  <div style="height: 22px;"></div>
  <button class="secondary-btn" id="cpBack">← Pick a different dragon</button>
</div>

<div class="overlay hidden" id="napScreen">
  <div class="nap-card">
    <div style="font-size: 64px;">💤</div>
    <h2>Nap time!</h2>
    <div class="score">You cured <span id="napCount">0</span> villagers!</div>
    <div id="napHighWrap"></div>
    <div class="stage-row">Biggest you got: <span id="napStage">🐉 Hatchling</span></div>
    <div class="btn-row">
      <button class="big-btn" id="napPlayAgain">Play Again</button>
      <button class="secondary-btn" id="napPickDragon">Pick a different dragon</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
