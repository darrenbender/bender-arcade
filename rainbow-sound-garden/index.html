<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rainbow Garden">
<title>Rainbow Sound Garden</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ START OVERLAY ============ -->
<div id="start-screen">
  <svg class="bear-big" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="55" cy="60" r="22" fill="#c08a5e"/>
    <circle cx="145" cy="60" r="22" fill="#c08a5e"/>
    <circle cx="55" cy="60" r="12" fill="#e8b88a"/>
    <circle cx="145" cy="60" r="12" fill="#e8b88a"/>
    <ellipse cx="100" cy="110" rx="65" ry="58" fill="#d49d6e"/>
    <ellipse cx="100" cy="130" rx="32" ry="24" fill="#f1d4ad"/>
    <ellipse cx="78" cy="105" rx="5" ry="7" fill="#3a3245"/>
    <ellipse cx="122" cy="105" rx="5" ry="7" fill="#3a3245"/>
    <circle cx="76" cy="103" r="1.6" fill="white"/>
    <circle cx="120" cy="103" r="1.6" fill="white"/>
    <circle cx="62" cy="125" r="6" fill="#f3a7a7" opacity="0.7"/>
    <circle cx="138" cy="125" r="6" fill="#f3a7a7" opacity="0.7"/>
    <ellipse cx="100" cy="124" rx="5" ry="4" fill="#3a3245"/>
    <path d="M 88 135 Q 100 144 112 135" stroke="#3a3245" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 45 165 Q 100 180 155 165 L 158 175 Q 100 192 42 175 Z" fill="url(#scarf-grad)"/>
    <defs>
      <linearGradient id="scarf-grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#ef6b6b"/>
        <stop offset="20%"  stop-color="#f29849"/>
        <stop offset="40%"  stop-color="#f3c948"/>
        <stop offset="60%"  stop-color="#6dc57d"/>
        <stop offset="80%"  stop-color="#4ea8e3"/>
        <stop offset="100%" stop-color="#b07dc9"/>
      </linearGradient>
    </defs>
  </svg>
  <h1>Rainbow Sound Garden</h1>
  <p>Tap colors to make music, <span id="player-name">friend</span>!</p>
  <button id="start-btn">Let's Play</button>
  <button class="start-secondary" id="start-back">← Back to Arcade</button>
</div>

<!-- ============ MAIN APP ============ -->
<div id="app">
  <header>
    <div class="bear-wrap">
      <svg class="bear" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="55" cy="60" r="22" fill="#c08a5e"/>
        <circle cx="145" cy="60" r="22" fill="#c08a5e"/>
        <circle cx="55" cy="60" r="12" fill="#e8b88a"/>
        <circle cx="145" cy="60" r="12" fill="#e8b88a"/>
        <ellipse cx="100" cy="110" rx="65" ry="58" fill="#d49d6e"/>
        <ellipse cx="100" cy="130" rx="32" ry="24" fill="#f1d4ad"/>
        <ellipse cx="78" cy="105" rx="5" ry="7" fill="#3a3245"/>
        <ellipse cx="122" cy="105" rx="5" ry="7" fill="#3a3245"/>
        <circle cx="76" cy="103" r="1.6" fill="white"/>
        <circle cx="120" cy="103" r="1.6" fill="white"/>
        <circle cx="62" cy="125" r="6" fill="#f3a7a7" opacity="0.7"/>
        <circle cx="138" cy="125" r="6" fill="#f3a7a7" opacity="0.7"/>
        <ellipse cx="100" cy="124" rx="5" ry="4" fill="#3a3245"/>
        <path d="M 88 135 Q 100 144 112 135" stroke="#3a3245" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M 45 165 Q 100 180 155 165 L 158 175 Q 100 192 42 175 Z" fill="url(#scarf-grad2)"/>
        <defs>
          <linearGradient id="scarf-grad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#ef6b6b"/>
            <stop offset="20%"  stop-color="#f29849"/>
            <stop offset="40%"  stop-color="#f3c948"/>
            <stop offset="60%"  stop-color="#6dc57d"/>
            <stop offset="80%"  stop-color="#4ea8e3"/>
            <stop offset="100%" stop-color="#b07dc9"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="speech" id="speech">Hi! Tap any color to make music!</div>
    <div class="nav-bar hidden" id="nav-bar">
      <button class="nav-btn" id="nav-menu" aria-label="Back to game menu">↩</button>
      <button class="nav-btn" id="nav-arcade" aria-label="Back to arcade">🏠</button>
    </div>
  </header>

  <section class="pickers" aria-label="Sound settings">
    <div class="picker-strip">
      <span class="picker-label">Sound</span>
      <div class="picker-row" id="instrument-picker" role="radiogroup" aria-label="Instrument">
        <button class="picker-btn" data-instrument="bells"    aria-label="Bells">🔔</button>
        <button class="picker-btn" data-instrument="musicbox" aria-label="Music box">🎹</button>
        <button class="picker-btn" data-instrument="marimba"  aria-label="Marimba">🪘</button>
        <button class="picker-btn" data-instrument="harp"     aria-label="Plucky harp">🎵</button>
        <button class="picker-btn" data-instrument="pad"      aria-label="Dream pad">☁️</button>
      </div>
    </div>
    <div class="picker-strip">
      <span class="picker-label">Mood</span>
      <div class="picker-row" id="mood-picker" role="radiogroup" aria-label="Mood">
        <button class="picker-btn" data-mood="sunny"  aria-label="Sunny">☀️</button>
        <button class="picker-btn" data-mood="dreamy" aria-label="Dreamy">🌙</button>
      </div>
      <span class="picker-label picker-label-spacer">Pitch</span>
      <div class="picker-row" id="octave-picker" role="radiogroup" aria-label="Pitch">
        <button class="picker-btn" data-octave="-1" aria-label="Low pitch">🐻</button>
        <button class="picker-btn" data-octave="0"  aria-label="Mid pitch">🐱</button>
        <button class="picker-btn" data-octave="1"  aria-label="High pitch">🐦</button>
      </div>
    </div>
  </section>

  <div class="grid-wrap">
    <div class="grid" id="grid" aria-label="Music grid">
      <div class="drum-label" aria-hidden="true">🥁</div>
    </div>
  </div>

  <div class="controls">
    <div class="tempo" id="tempo">
      <button class="tempo-btn" data-bpm="70"  aria-label="Slow">🐢</button>
      <button class="tempo-btn" data-bpm="110" aria-label="Medium">🚶</button>
      <button class="tempo-btn" data-bpm="160" aria-label="Fast">🐰</button>
    </div>
    <button class="play-btn" id="play" aria-label="Play">
      <svg viewBox="0 0 24 24" fill="white" aria-hidden="true"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <div class="right-group">
      <button class="icon-btn" id="clear" aria-label="Clear song">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          <path d="M10 11v6M14 11v6"></path>
        </svg>
        <span>Fresh Start</span>
      </button>
    </div>
  </div>
</div>

<!-- ============ FRESH START CONFIRM ============ -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-icon">🌱</div>
    <h2>Fresh start?</h2>
    <p>This will clear your song. That's okay — you can always make a new one!</p>
    <div class="modal-btns">
      <button class="cancel"  id="modal-cancel">Keep my song</button>
      <button class="confirm" id="modal-confirm">Fresh start</button>
    </div>
  </div>
</div>

<!-- ============ LEAVE-GAME CONFIRM ============ -->
<div class="modal" id="nav-modal">
  <div class="modal-card">
    <div class="modal-icon">👋</div>
    <h2>Leave game?</h2>
    <p>Your song won't be saved.</p>
    <div class="modal-btns">
      <button class="cancel"  id="nav-modal-cancel">Keep playing</button>
      <button class="confirm" id="nav-modal-confirm">Yes, leave</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
